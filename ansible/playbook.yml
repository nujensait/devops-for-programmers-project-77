---
- name: Setup web servers
  hosts: webservers
  become: true
  vars:
    docker_install_compose: true
    docker_compose_version: "2.17.2"
    pip_install_packages:
      - name: docker
      - name: docker-compose
    # DataDog configuration
    datadog_api_key: "{{ lookup('ansible.builtin.env', 'DATADOG_API_KEY', default=datadog_api_key) }}"
    datadog_site: "{{ lookup('ansible.builtin.env', 'DATADOG_SITE', default=datadog_site) }}"
    datadog_config:
      logs_enabled: true
      process_config:
        enabled: "true"
      apm_config:
        enabled: true
    datadog_checks:
      http_check:
        init_config:
        instances:
          - name: App Status
            url: http://localhost:80
            timeout: 5
            method: GET
            http_response_status_code: 200

  tasks:
    - name: Update apt cache
      apt:
        update_cache: yes
        cache_valid_time: 3600
      tags: [setup, update]

    - name: Install required packages
      apt:
        name:
          - apt-transport-https
          - ca-certificates
          - curl
          - software-properties-common
          - python3-pip
        state: present
      tags: [setup, packages]

    - name: Include Docker role
      include_role:
        name: geerlingguy.docker
      tags: [setup, docker]

    - name: Include pip role
      include_role:
        name: geerlingguy.pip
      tags: [setup, pip]

    - name: Install DataDog agent
      include_role:
        name: datadog.datadog
      tags: [setup, monitoring, datadog]

    - name: Create app directory
      file:
        path: /opt/app
        state: directory
        mode: '0755'
      tags: [deploy, app]

    - name: Copy docker-compose.yml
      copy:
        src: ../docker-compose.yml
        dest: /opt/app/docker-compose.yml
        mode: '0644'
      tags: [deploy, app]

    - name: Copy application code
      synchronize:
        src: ../code/
        dest: /opt/app/code/
        delete: yes
        recursive: yes
      tags: [deploy, app]

    - name: Deploy application with Docker Compose
      community.docker.docker_compose:
        project_src: /opt/app
        state: present
      tags: [deploy, app]

    - name: Ensure containers are running
      community.docker.docker_compose:
        project_src: /opt/app
        state: present
        restarted: yes
      tags: [deploy, restart]
